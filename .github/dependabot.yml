version: 2

updates:
  # npm deps for the package itself.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Majors stay maintainer-initiated — they tend to need migration work and
    # often arrive with Bun-lockfile mismatches that Dependabot can't repair.
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
    groups:
      # Bundle minor + patch updates into one PR per week.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # npm deps for the docs site.
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Pinned action versions across .github/workflows (actions/checkout, etc.).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
