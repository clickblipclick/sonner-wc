name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # release notes from full history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - run: bun install --frozen-lockfile

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: bun run typecheck
      - run: bun run test
      - run: bun run lint:exports

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e -- --project=chromium

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Required-reviewer gate. The environment is restricted to v*.*.* tags
    # in its protection rules, so only release tags can reach this job.
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/sonner-wc
    permissions:
      contents: write   # create GitHub Release
      id-token: write   # npm provenance / OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 ships with npm 10, but trusted-publisher OIDC needs 11.5+.
      # The bundled npm in the Node 22 toolcache image is also missing some
      # of its own deps, so `npm i -g npm@latest` fails. Use corepack to
      # install a clean npm independently of the bundled one.
      - run: corepack enable npm
      - run: corepack prepare npm@latest --activate
      - run: npm --version

      - run: bun install --frozen-lockfile
      - run: bun run lint:exports   # produces dist/ for the publish step

      - name: Publish to npm
        run: npm publish --provenance --access public

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
