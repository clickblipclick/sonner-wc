name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs for the same ref so only the latest commit deploys.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.5
      - run: bun install --frozen-lockfile

      # The site's Vite alias `$wc` resolves to dist/sonner-wc.js, so the
      # WC has to be built before the site can be bundled.
      - run: bun run build:wc

      - name: Build site
        env:
          # Subpath under <user>.github.io/<repo>/. Change to '' if you
          # later attach a custom domain that serves at the root.
          BASE_PATH: /sonner-wc
        run: cd site && bun run build

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          # Auto-enable Pages on first run so a fresh repo deploys without
          # a manual Settings → Pages → Source: GitHub Actions step.
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
