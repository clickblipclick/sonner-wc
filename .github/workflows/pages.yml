name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs for the same ref so only the latest commit deploys.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # The site's Vite alias `$wc` resolves to dist/sonner-wc.js, so the
      # WC has to be built before the site can be bundled.
      - run: bun run build:wc

      - name: Build site
        env:
          # Subpath under <user>.github.io/<repo>/. Change to '' if you
          # later attach a custom domain that serves at the root.
          BASE_PATH: /sonner-wc
        run: cd site && bun run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
