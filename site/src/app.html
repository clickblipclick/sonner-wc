<!doctype html>
<html lang="en" data-theme="sonner-light">
  <head>
    <meta charset="utf-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Pre-paint: pick theme before SK hydrates to avoid FOUC.
      // localStorage 'theme' is the user preference: 'light' | 'dark' | 'system'.
      // Absent = 'system'. Resolved data-theme is 'sonner-light' | 'sonner-dark'.
      (function () {
        try {
          var pref = localStorage.getItem('theme') || 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved =
            pref === 'system'
              ? prefersDark
                ? 'sonner-dark'
                : 'sonner-light'
              : pref === 'dark'
                ? 'sonner-dark'
                : 'sonner-light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (_) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-base-100 text-base-content">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
